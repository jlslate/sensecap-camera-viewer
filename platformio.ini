[env:sensecap_indicator]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi

monitor_speed = 115200
upload_speed = 460800

build_flags =
    -I include
    -D NO_SIMD  ; disables JPEGDEC's ESP32-S3 SIMD assembly IDCT/dequant/chroma-upsample path —
                ; testing whether that hand-written SIMD code is the source of the persistent
                ; detail-correlated image corruption (confirmed the raw JPEG file itself is clean)
    -D ARDUINO_LOOP_STACK_SIZE=65536  ; was 32768 (originally 8192) — TEST: WiFiManager's captive
                ; portal runs its own HTTP+DNS request handling inside the same blocking call in
                ; setup(), on this same loopTask stack. Text on screen renders correctly right up
                ; until the AP has a client actually connect and request the config page (i.e.
                ; once real request-handling code runs), then intermittently comes out split —
                ; matches a stack-overflow signature (silently smashes adjacent memory, only
                ; triggered by the deeper call path of actually handling a request) rather than
                ; a rotation/logic bug, which we've since ruled out by removing all transforms.

lib_deps =
    moononournation/GFX Library for Arduino@^1.4.9
    hideakitai/PCA95x5@^0.1.3
    ArduinoJson
    bitbank2/JPEGDEC@^1.2.8
    bodmer/TJpg_Decoder@^1.1.0  ; independent decoder, testing if JPEGDEC itself is the source of corruption
    tzapu/WiFiManager@^2.0.17  ; captive-portal WiFi + site config (NAS host/port/user/password)
